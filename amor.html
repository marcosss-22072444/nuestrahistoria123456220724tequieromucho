<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 🤍</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Playfair+Display:ital,wght@1,400;1,600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,220,235,0.9) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 80%, rgba(255,180,210,0.7) 0%, transparent 50%),
    linear-gradient(160deg, #fce4ef 0%, #f8cce0 40%, #f5b8d4 100%);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden; font-family:'Dancing Script',cursive;
  gap: 18px;
}

/* floating hearts */
.fh{position:fixed;inset:0;pointer-events:none;z-index:0;}
.fh span{position:absolute;animation:fhUp linear infinite;opacity:0;}
@keyframes fhUp{
  0%  {transform:translateY(105vh) rotate(-10deg);opacity:0}
  8%  {opacity:0.28}
  92% {opacity:0.2}
  100%{transform:translateY(-8vh)  rotate(15deg);opacity:0}
}

/* stage */
.stage{position:relative;z-index:2;cursor:pointer;user-select:none;
  transition:transform .25s; margin-top: 10px;}
.stage:hover{transform:scale(1.015);}
.stage:active{transform:scale(0.98);}

/* ── TAP BUTTON ── */
.tap-btn{
  position:relative; z-index:3;
  display:flex; align-items:center; gap:10px;
  background: linear-gradient(135deg, #ff4d7e 0%, #e0195a 50%, #b5003d 100%);
  color:#fff;
  border:none; border-radius:50px;
  padding: 14px 32px;
  font-family:'Dancing Script',cursive;
  font-size:1.5rem; font-weight:700;
  cursor:pointer;
  box-shadow:
    0 6px 24px rgba(200,0,70,0.45),
    0 2px 6px rgba(255,100,140,0.3),
    inset 0 1px 2px rgba(255,255,255,0.25);
  letter-spacing:.03em;
  animation: btnPulse 2s ease-in-out infinite;
  transition: box-shadow .2s, transform .15s;
  white-space: nowrap;
}
.tap-btn:hover{
  box-shadow:0 10px 32px rgba(200,0,70,0.6), inset 0 1px 2px rgba(255,255,255,0.3);
  transform:translateY(-3px) scale(1.04);
}
.tap-btn:active{transform:translateY(0) scale(0.97);}
@keyframes btnPulse{
  0%,100%{box-shadow:0 6px 24px rgba(200,0,70,0.45),0 0 0 0 rgba(220,0,80,0.4)}
  50%    {box-shadow:0 6px 24px rgba(200,0,70,0.45),0 0 0 10px rgba(220,0,80,0)}
}
.btn-heart{font-size:1.3rem; animation:btnHeart 1.5s ease-in-out infinite;}
@keyframes btnHeart{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* MODAL */
.overlay{
  position:fixed;inset:0;
  background:rgba(220,80,130,0.35);
  backdrop-filter:blur(12px) saturate(1.3);
  z-index:200;display:none;
  align-items:center;justify-content:center;
  padding:20px;
}
.overlay.open{display:flex;animation:fadeOverlay .3s ease both}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}

.card{
  background:linear-gradient(155deg,#fff8fb 0%,#ffe4ef 50%,#ffd2e8 100%);
  border:2px solid rgba(244,160,192,0.7);
  border-radius:36px;
  padding:3rem 2.6rem 2.4rem;
  max-width:380px;width:100%;
  text-align:center;
  box-shadow:
    0 20px 60px rgba(180,0,70,0.28),
    0 4px 12px rgba(255,150,190,0.2),
    inset 0 2px 12px rgba(255,255,255,0.8);
  animation:cardPop .6s cubic-bezier(.34,1.56,.64,1) both;
  position:relative; overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:36px;
  background:radial-gradient(ellipse at 30% 10%, rgba(255,220,235,0.5) 0%, transparent 60%);
  pointer-events:none;
}
@keyframes cardPop{from{opacity:0;transform:scale(0.3) rotate(-8deg)}to{opacity:1;transform:scale(1)}}
.card-top-heart{
  display:flex;align-items:center;justify-content:center;
  margin-bottom:.7rem;animation:topHeart 2s ease-in-out infinite;
  transform-origin:center;
}
.card-top-heart svg{
  width:72px;height:66px;
  filter:drop-shadow(0 4px 12px rgba(180,0,60,0.45));
}
@keyframes topHeart{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
.card-subtitle{font-family:'Playfair Display',serif;font-style:italic;font-weight:600;
  color:#c06080;font-size:1.05rem;letter-spacing:.08em;margin-bottom:.5rem;}
.card-main{font-size:2rem;font-weight:700;color:#880038;line-height:1.45;margin:.6rem 0 .9rem;}
.card-body{font-size:1.22rem;color:#a03a60;line-height:1.7;margin-bottom:1.3rem;}
.card-love{font-size:2.2rem;font-weight:700;color:#b8003a;display:block;margin-bottom:1.5rem;}
.card-hearts{font-size:1.6rem;letter-spacing:.4rem;margin-bottom:1.6rem;display:block;}
.sp{position:absolute;animation:spFloat 2.2s ease-in-out infinite;}
@keyframes spFloat{0%,100%{transform:scale(1) rotate(0deg);opacity:.65}50%{transform:scale(1.35) rotate(14deg);opacity:1}}
.close-btn{
  background:linear-gradient(135deg,#f04070,#aa0030);color:#fff;
  border:none;border-radius:40px;padding:.65rem 2.2rem;
  font-family:'Dancing Script',cursive;font-size:1.2rem;font-weight:700;cursor:pointer;
  box-shadow:0 5px 18px rgba(170,0,50,.4);transition:transform .2s,box-shadow .2s;
}
.close-btn:hover{transform:translateY(-2px) scale(1.05);box-shadow:0 8px 24px rgba(170,0,50,.5);}
</style>
</head>
<body>

<div class="fh" id="fh"></div>

<div class="stage" id="stageDiv">
  <canvas id="c" width="400" height="490"></canvas>
</div>

<button class="tap-btn" id="tapBtn">
  <span class="btn-heart">🤍</span>
  Pulsa aquí
  <span class="btn-heart" style="animation-delay:.75s">🤍</span>
</button>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="card">
    <span class="sp" style="top:14px;left:18px;font-size:1rem;animation-delay:0s">🤍</span>
    <span class="sp" style="top:18px;right:20px;font-size:1rem;animation-delay:.8s">🤍</span>
    <span class="sp" style="bottom:70px;left:14px;font-size:.9rem;animation-delay:1.4s">🤍</span>
    <span class="sp" style="bottom:74px;right:16px;font-size:.9rem;animation-delay:.4s">🤍</span>
    <div class="card-top-heart">
      <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="hg" cx="38%" cy="28%" r="65%">
            <stop offset="0%"  stop-color="#ff7aa0"/>
            <stop offset="30%" stop-color="#e8184e"/>
            <stop offset="65%" stop-color="#c00038"/>
            <stop offset="100%" stop-color="#800020"/>
          </radialGradient>
          <radialGradient id="hshine" cx="32%" cy="22%" r="40%">
            <stop offset="0%"  stop-color="rgba(255,220,230,0.65)"/>
            <stop offset="100%" stop-color="rgba(255,220,230,0)"/>
          </radialGradient>
        </defs>
        <path d="M50 82 C50 82 8 52 8 28 C8 14 18 5 30 5 C38 5 45 10 50 17 C55 10 62 5 70 5 C82 5 92 14 92 28 C92 52 50 82 50 82Z" fill="url(#hg)"/>
        <path d="M50 82 C50 82 8 52 8 28 C8 14 18 5 30 5 C38 5 45 10 50 17 C55 10 62 5 70 5 C82 5 92 14 92 28 C92 52 50 82 50 82Z" fill="url(#hshine)"/>
        <ellipse cx="32" cy="20" rx="10" ry="7" fill="rgba(255,240,245,0.45)" transform="rotate(-20,32,20)"/>
      </svg>
    </div>
    <p class="card-subtitle">— Para ti —</p>
    <p class="card-main">Para la mejor persona<br>de mi vida</p>
    <p class="card-body">
      Cada día a tu lado<br>
      es el más bonito de todos.<br>
      Eres mi lugar favorito en el mundo,<br>
      mi casa, mi calma, mi todo.
    </p>
    <span class="card-hearts">🤍 🤍 🤍</span>
    <span class="card-love">Te amo amor mio 🤍</span>
    <button class="close-btn" onclick="closeNote()">Cerrar 🤍</button>
  </div>
</div>

<script>
/* ── floating bg hearts ── */
const fhEl=document.getElementById('fh');
for(let i=0;i<30;i++){
  const s=document.createElement('span');
  s.textContent='🤍';
  s.style.cssText=`left:${Math.random()*100}vw;font-size:${0.7+Math.random()*1.1}rem;
    animation-duration:${8+Math.random()*9}s;animation-delay:${Math.random()*14}s`;
  fhEl.appendChild(s);
}

/* ── Canvas ── */
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
const W=cv.width, H=cv.height;
const T0=performance.now(), DUR=3600;

function cl(v,a,b){return Math.max(a,Math.min(b,v));}
function eio(t){return t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;}
function sl(t,a,b){return eio(cl((t-a)/(b-a),0,1));}

/* ═══════════════════════════════
   ROSE — clean, ordered petals
   Each petal pivots from flower centre.
   We keep transform-origin at (0,0) = flower centre,
   rotate to angle, then draw the petal shape upward.
═══════════════════════════════ */
function rose(ox,oy,R,p){
  if(p<=0)return;
  cx.save();cx.translate(ox,oy);

  /* layers: outermost first so inner ones paint on top */
  const layers=[
    // {count, angleOffset, dist, petalW, petalH, startT, hue, lightBase}
    {n:8, off:0,           dist:R*.78, pw:R*.48, ph:R*.95, t:.00, h:348, lb:40},
    {n:7, off:Math.PI/8,   dist:R*.60, pw:R*.42, ph:R*.78, t:.18, h:350, lb:45},
    {n:6, off:0,           dist:R*.44, pw:R*.35, ph:R*.62, t:.36, h:352, lb:50},
    {n:5, off:Math.PI/6,   dist:R*.29, pw:R*.28, ph:R*.47, t:.54, h:354, lb:55},
  ];

  layers.forEach(({n,off,dist,pw,ph,t,h,lb})=>{
    const lp=cl((p-t)/(1-t),0,1);
    if(lp<=0)return;

    for(let i=0;i<n;i++){
      const angle=off+(i/n)*Math.PI*2;

      cx.save();
      cx.rotate(angle);                    // point petal in its direction
      cx.scale(lp,lp);                     // bloom scale

      /* gradient along petal length (bottom=base, top=tip) */
      const g=cx.createLinearGradient(0,0, 0,-ph);
      g.addColorStop(0,  `hsl(${h},100%,${lb-8}%)`);  // base: rich dark
      g.addColorStop(.28,`hsl(${h},100%,${lb+10}%)`); // mid: bright
      g.addColorStop(.65,`hsl(${h},100%,${lb-2}%)`);  // upper: deepen
      g.addColorStop(1,  `hsl(${h},100%,${lb-22}%)`); // tip: very dark

      /* petal shape — base at origin, tip at (0, -ph)
         Uses mirror symmetry so it's always clean */
      cx.beginPath();
      cx.moveTo(0,0);
      // left side up
      cx.bezierCurveTo(-pw*.9,-ph*.22, -pw*.88,-ph*.7, -pw*.18,-ph*.97);
      // tip curve
      cx.bezierCurveTo(-pw*.06,-ph*1.05, pw*.06,-ph*1.05, pw*.18,-ph*.97);
      // right side down
      cx.bezierCurveTo(pw*.88,-ph*.7, pw*.9,-ph*.22, 0,0);
      cx.fillStyle=g; cx.fill();

      /* silky sheen on left half */
      const sh=cx.createLinearGradient(-pw*.6,-ph*.5, pw*.1,-ph*.1);
      sh.addColorStop(0,'rgba(255,210,220,.3)');
      sh.addColorStop(1,'rgba(255,210,220,0)');
      cx.beginPath();
      cx.moveTo(0,0);
      cx.bezierCurveTo(-pw*.9,-ph*.22,-pw*.88,-ph*.7,-pw*.18,-ph*.97);
      cx.bezierCurveTo(-pw*.06,-ph*1.05,pw*.06,-ph*1.05,pw*.18,-ph*.97);
      cx.bezierCurveTo(pw*.88,-ph*.7,pw*.9,-ph*.22,0,0);
      cx.fillStyle=sh; cx.fill();

      /* centre vein */
      cx.beginPath();cx.moveTo(0,-1);cx.lineTo(0,-ph*.88);
      cx.strokeStyle='rgba(80,0,10,.18)';cx.lineWidth=.8;cx.stroke();

      cx.restore();
    }
  });

  /* Centre bud */
  const bp=cl((p-.7)/.3,0,1);
  if(bp>0){
    const bg=cx.createRadialGradient(-R*.06,-R*.06,0,0,0,R*.24*bp);
    bg.addColorStop(0,'hsl(340,100%,74%)');
    bg.addColorStop(.4,'hsl(348,100%,50%)');
    bg.addColorStop(.8,'hsl(352,100%,28%)');
    bg.addColorStop(1, 'hsl(356,100%,13%)');
    cx.beginPath();cx.arc(0,0,R*.24*bp,0,Math.PI*2);
    cx.fillStyle=bg;cx.fill();
    /* tiny specular */
    cx.beginPath();cx.arc(-R*.06,-R*.06,R*.07*bp,0,Math.PI*2);
    cx.fillStyle='rgba(255,200,210,.35)';cx.fill();
  }
  cx.restore();
}

/* ── STEM (smooth bezier) ── */
function stem(x1,y1,cpx,cpy,x2,y2,p,w){
  if(p<=0)return;
  /* sample the bezier at p */
  const steps=40, pts=[];
  for(let i=0;i<=steps;i++){
    const t2=i/steps;
    const mt=1-t2;
    pts.push([
      mt*mt*x1+2*mt*t2*cpx+t2*t2*x2,
      mt*mt*y1+2*mt*t2*cpy+t2*t2*y2
    ]);
  }
  const drawn=Math.floor(p*steps);
  const sg=cx.createLinearGradient(x1,y1,x2,y2);
  sg.addColorStop(0,'#357a25');sg.addColorStop(.5,'#4fa832');sg.addColorStop(1,'#2d6820');
  cx.save();cx.strokeStyle=sg;cx.lineWidth=w||4;cx.lineCap='round';cx.lineJoin='round';
  cx.beginPath();cx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<=drawn;i++) cx.lineTo(pts[i][0],pts[i][1]);
  if(drawn<steps){
    const fr=p*steps-drawn;
    const p0=pts[drawn],p1=pts[drawn+1]||pts[drawn];
    cx.lineTo(p0[0]+(p1[0]-p0[0])*fr,p0[1]+(p1[1]-p0[1])*fr);
  }
  cx.stroke();cx.restore();
}

/* ── LEAF ── */
function leaf(ax,ay,bx,by,side,p){
  if(p<=0)return;
  const mx=(ax+bx)/2, my=(ay+by)/2;
  const dx=bx-ax, dy=by-ay, len=Math.sqrt(dx*dx+dy*dy);
  const bulge=len*.38*p*side;
  const nx=-dy/len*bulge, ny=dx/len*bulge;
  cx.save();cx.globalAlpha=cl(p*2,0,1);
  const g=cx.createLinearGradient(ax,ay,bx,by);
  g.addColorStop(0,'#2a6c1e');g.addColorStop(.5,'#4eaa30');g.addColorStop(1,'#1e5416');
  cx.beginPath();cx.moveTo(ax,ay);
  cx.quadraticCurveTo(mx+nx,my+ny,bx,by);
  cx.quadraticCurveTo(mx-nx*.2,my-ny*.2,ax,ay);
  cx.fillStyle=g;cx.fill();
  cx.beginPath();cx.moveTo(ax,ay);cx.quadraticCurveTo(mx+nx*.55,my+ny*.55,bx,by);
  cx.strokeStyle='rgba(15,55,10,.3)';cx.lineWidth=.9;cx.stroke();
  cx.restore();
}

/* ═══════════════════════════════════════
   PAPER WRAP — realistic florist cone
   Drawn as overlapping folded panels
═══════════════════════════════════════ */
function wrap(p){
  if(p<=0)return;
  cx.save();cx.globalAlpha=p;

  /* Bouquet stems sit around x=200, y≈360.
     Paper cone: wide opening at top, tapers to rounded bottom. */
  const MX=200; // centre x
  const TOP=290; // top edge of paper — raised to cover more stems/flowers
  const BOT=536; // bottom tip
  const TW=130;  // half-width at top — wider to hug the bouquet
  const BW=14;   // half-width at bottom (rounded point)

  /* Helper: x on left/right edge at progress t (0=top,1=bottom) */
  function ex(side,t){ // side: -1 left, +1 right
    const hw=TW+(BW-TW)*t*t; // quadratic taper
    return MX+side*hw;
  }
  function ey(t){ return TOP+(BOT-TOP)*t; }

  /* ── Drop shadow ── */
  cx.save();cx.shadowColor='rgba(140,0,50,0.18)';cx.shadowBlur=22;cx.shadowOffsetX=8;cx.shadowOffsetY=12;
  cx.beginPath();
  cx.moveTo(ex(-1,0),ey(0));
  for(let t=0;t<=1;t+=.05) cx.lineTo(ex(-1,t),ey(t));
  cx.quadraticCurveTo(MX-BW,BOT+10, MX,BOT+4);
  cx.quadraticCurveTo(MX+BW,BOT+10, ex(1,1),ey(1));
  for(let t=1;t>=0;t-=.05) cx.lineTo(ex(1,t),ey(t));
  cx.closePath();cx.fillStyle='rgba(0,0,0,.01)';cx.fill();cx.restore();

  /* ── Back panel (slightly wider, darker) ── */
  cx.beginPath();
  cx.moveTo(ex(-1,0)-6,ey(0)+4);
  for(let t=0;t<=1;t+=.05) cx.lineTo(ex(-1,t)-6*(1-t*.8),ey(t));
  cx.quadraticCurveTo(MX-BW,BOT+8,MX,BOT+2);
  cx.quadraticCurveTo(MX+BW,BOT+8,ex(1,1)+6*(1-.8),ey(1));
  for(let t=1;t>=0;t-=.05) cx.lineTo(ex(1,t)+6*(1-t*.8),ey(t));
  cx.closePath();
  const bg=cx.createLinearGradient(MX-TW,TOP,MX+TW,BOT);
  bg.addColorStop(0,'rgba(248,225,236,0.95)');
  bg.addColorStop(.5,'rgba(240,205,222,0.9)');
  bg.addColorStop(1,'rgba(228,185,208,0.88)');
  cx.fillStyle=bg;cx.fill();

  /* ── Main front panel ── */
  cx.beginPath();
  cx.moveTo(ex(-1,0),TOP);
  for(let t=0;t<=1;t+=.04){
    const x=ex(-1,t), y=ey(t);
    if(t===0) cx.moveTo(x,y); else cx.lineTo(x,y);
  }
  cx.quadraticCurveTo(MX-BW,BOT+5, MX,BOT);
  cx.quadraticCurveTo(MX+BW,BOT+5, ex(1,1),ey(1));
  for(let t=1;t>=0;t-=.04) cx.lineTo(ex(1,t),ey(t));
  cx.closePath();

  /* White paper with very faint pink tint */
  const fg=cx.createLinearGradient(MX-TW,TOP,MX+TW,BOT);
  fg.addColorStop(0,  'rgba(255,252,254,0.99)');
  fg.addColorStop(.25,'rgba(255,248,252,0.98)');
  fg.addColorStop(.55,'rgba(254,240,248,0.97)');
  fg.addColorStop(.82,'rgba(252,230,242,0.96)');
  fg.addColorStop(1,  'rgba(248,218,234,0.95)');
  cx.fillStyle=fg;cx.fill();

  /* ── Left folded flap ── */
  cx.beginPath();
  cx.moveTo(ex(-1,0),TOP);
  for(let t=0;t<=1;t+=.04) cx.lineTo(ex(-1,t),ey(t));
  cx.quadraticCurveTo(MX-BW,BOT+5,MX,BOT);
  cx.lineTo(MX-TW*.5,TOP+10);
  cx.closePath();
  const lf=cx.createLinearGradient(ex(-1,0),TOP,MX-TW*.3,BOT*.6);
  lf.addColorStop(0,'rgba(238,200,218,0.55)');
  lf.addColorStop(.6,'rgba(230,188,210,0.3)');
  lf.addColorStop(1,'rgba(225,180,205,0.12)');
  cx.fillStyle=lf;cx.fill();

  /* ── Right folded flap ── */
  cx.beginPath();
  cx.moveTo(ex(1,0),TOP);
  for(let t=0;t<=1;t+=.04) cx.lineTo(ex(1,t),ey(t));
  cx.quadraticCurveTo(MX+BW,BOT+5,MX,BOT);
  cx.lineTo(MX+TW*.5,TOP+10);
  cx.closePath();
  const rf=cx.createLinearGradient(ex(1,0),TOP,MX+TW*.3,BOT*.6);
  rf.addColorStop(0,'rgba(238,200,218,0.5)');
  rf.addColorStop(.6,'rgba(230,188,210,0.28)');
  rf.addColorStop(1,'rgba(225,180,205,0.1)');
  cx.fillStyle=rf;cx.fill();

  /* ── Vertical crease lines ── */
  cx.save();cx.strokeStyle='rgba(200,155,180,0.32)';cx.lineWidth=1.2;
  [-.62,-.3,.3,.62].forEach(frac=>{
    const xT=MX+frac*TW, xB=MX+frac*BW*1.5;
    cx.beginPath();
    cx.moveTo(xT,TOP+6);
    cx.bezierCurveTo(xT,TOP+80,xB,BOT-80,xB,BOT-8);
    cx.stroke();
  });cx.restore();

  /* ── Top folded edge highlight ── */
  cx.beginPath();
  cx.moveTo(ex(-1,0),TOP);
  cx.bezierCurveTo(MX-TW*.6,TOP-18,MX+TW*.6,TOP-18,ex(1,0),TOP);
  cx.strokeStyle='rgba(245,195,218,0.7)';cx.lineWidth=3;cx.stroke();
  /* shadow just below top edge */
  cx.beginPath();
  cx.moveTo(ex(-1,0),TOP+3);
  cx.bezierCurveTo(MX-TW*.6,TOP-12,MX+TW*.6,TOP-12,ex(1,0),TOP+3);
  cx.strokeStyle='rgba(195,130,165,0.3)';cx.lineWidth=1.5;cx.stroke();

  /* ── Hearts printed on paper ── */
  cx.globalAlpha=p*.68;
  const hearts=[
    [120,340,17],[162,368,13],[204,346,16],[244,376,12],
    [98,390,12],[182,392,10],[140,388,11],[266,364,12],
    [160,352,9],[226,386,10],[108,362,9],[252,352,11],[144,378,10],
    [186,378,9],[220,358,10],
    [118,408,15],[165,430,12],[210,412,14],[250,428,11],[95,440,10],[178,445,9]
  ];
  hearts.forEach(([hx,hy,fs])=>{cx.font=`${fs}px serif`;cx.fillText('🤍',hx,hy);});

  cx.restore();
}

/* ── RIBBON BOW ── */
function ribbon(p){
  if(p<=0)return;
  cx.save();cx.globalAlpha=p;
  const rx=200, ry=300;

  /* tails — two flowing ribbons */
  [[-1,1],[1,-1]].forEach(([sa,sb])=>{
    const tg=cx.createLinearGradient(rx,ry,rx+sa*45,ry+75);
    tg.addColorStop(0,'#e82a58');tg.addColorStop(.5,'#c01848');tg.addColorStop(1,'#8a0030');
    cx.save();cx.strokeStyle=tg;cx.lineWidth=9;cx.lineCap='round';
    cx.beginPath();cx.moveTo(rx+sa*7,ry+5);
    cx.bezierCurveTo(rx+sa*28,ry+30, rx+sa*42,ry+52, rx+sa*38,ry+76);
    cx.stroke();
    /* ribbon edge highlight */
    cx.strokeStyle='rgba(255,160,185,.3)';cx.lineWidth=3;
    cx.beginPath();cx.moveTo(rx+sa*4,ry+6);
    cx.bezierCurveTo(rx+sa*24,ry+29,rx+sa*36,ry+50,rx+sa*32,ry+74);
    cx.stroke();
    cx.restore();
  });

  /* bow loops */
  function loop(s){
    cx.save();
    const lg=cx.createRadialGradient(rx+s*24,ry-14,2,rx+s*16,ry-6,52);
    lg.addColorStop(0,'#ff7898');
    lg.addColorStop(.35,'#e62258');
    lg.addColorStop(.75,'#b5003e');
    lg.addColorStop(1,'#880028');
    cx.beginPath();
    cx.moveTo(rx,ry);
    cx.bezierCurveTo(rx+s*16,ry-5,  rx+s*68,ry-48, rx+s*55,ry-20);
    cx.bezierCurveTo(rx+s*46,ry-4,  rx+s*16,ry-1,  rx,ry);
    cx.fillStyle=lg;cx.fill();
    /* sheen */
    cx.beginPath();
    cx.moveTo(rx+s*10,ry-2);
    cx.bezierCurveTo(rx+s*24,ry-12,rx+s*54,ry-40,rx+s*44,ry-22);
    cx.strokeStyle='rgba(255,190,210,.45)';cx.lineWidth=3;cx.lineCap='round';cx.stroke();
    /* crease */
    cx.beginPath();
    cx.moveTo(rx+s*4,ry-1);
    cx.bezierCurveTo(rx+s*18,ry-8,rx+s*46,ry-34,rx+s*36,ry-18);
    cx.strokeStyle='rgba(130,0,30,.22)';cx.lineWidth=1.5;cx.stroke();
    cx.restore();
  }
  loop(-1); loop(1);

  /* centre heart knot */
  cx.save();cx.translate(rx,ry-7);cx.scale(p*1.1,p*1.1);
  const kg=cx.createRadialGradient(-4,-7,1,0,-2,18);
  kg.addColorStop(0,'#ff90b0');kg.addColorStop(.45,'#d81050');kg.addColorStop(1,'#750020');
  cx.beginPath();
  cx.moveTo(0,10);
  cx.bezierCurveTo(-18,-2,-20,-22,0,-17);
  cx.bezierCurveTo(20,-22,18,-2,0,10);
  cx.fillStyle=kg;cx.fill();
  cx.strokeStyle='rgba(255,160,190,.5)';cx.lineWidth=.9;cx.stroke();
  cx.restore();

  cx.restore();
}

/* ── MAIN RENDER LOOP ── */
function frame(now){
  const t=cl((now-T0)/DUR,0,1);
  cx.clearRect(0,0,W,H);

  const wP =sl(t,.00,.30);
  const s1P=sl(t,.08,.42); const s2P=sl(t,.11,.44); const s3P=sl(t,.13,.46);
  const s4P=sl(t,.15,.47); const s5P=sl(t,.17,.48); const s6P=sl(t,.12,.45); const s7P=sl(t,.14,.46);
  const lP =sl(t,.32,.60); const l2P=sl(t,.35,.63); const l3P=sl(t,.37,.65);
  const rbP=sl(t,.50,.78);
  const r1P=sl(t,.42,.92); const r2P=sl(t,.45,.94); const r3P=sl(t,.47,.96);
  const r4P=sl(t,.50,.99); const r5P=sl(t,.52,1.0); const r6P=sl(t,.54,1.0); const r7P=sl(t,.44,.93);

  /* paper wrap first */
  wrap(wP);

  /* stems — bezier curves (x1,y1,cpx,cpy,x2,y2) */
  stem(200,420, 196,320, 182,188, s1P, 5.5);   // centre
  stem(197,421, 178,330, 130,206, s2P, 4.8);   // mid-left
  stem(195,422, 165,340, 100,232, s3P, 4.2);   // far-left
  stem(203,421, 218,328, 244,208, s4P, 4.8);   // mid-right
  stem(205,422, 230,340, 268,234, s5P, 4.2);   // far-right
  stem(199,420, 196,328, 190,200, s6P, 4.5);   // inner-left
  stem(201,420, 206,326, 212,200, s7P, 4.5);   // inner-right

  /* leaves (ax,ay,bx,by,side,p) */
  leaf(175,306, 150,276, 1,  lP);
  leaf(164,318, 140,294, 1,  l2P);
  leaf(216,300, 240,272, -1, lP);
  leaf(226,314, 248,288, -1, l2P);
  leaf(138,260, 114,240, 1,  l3P);
  leaf(238,264, 262,246, -1, l3P);
  leaf(180,270, 160,250, 1,  l2P);
  leaf(215,272, 232,254, -1, l2P);

  /* roses */
  rose(182,175, 43, r1P);   // centre — largest
  rose(126,204, 36, r2P);
  rose(240,207, 36, r3P);
  rose( 93,228, 28, r4P);
  rose(270,232, 28, r5P);
  rose(158,208, 31, r6P);
  rose(206,210, 31, r7P);

  /* ribbon on top */
  ribbon(rbP);

  if(t<1) requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* interactions */
function openNote(){document.getElementById('overlay').classList.add('open');}
function closeNote(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('stageDiv').addEventListener('click',openNote);
document.getElementById('tapBtn').addEventListener('click',openNote);
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay'))closeNote();
});
</script>
