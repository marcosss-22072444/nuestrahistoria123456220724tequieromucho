<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        /* FONDO ROSA INTENSO */
        body { 
            background-color: #e6699c; 
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 10px; /* Menos relleno en móviles */
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* TÍTULO ADAPTABLE */
        h1 { 
            color: white; 
            font-size: clamp(1.8em, 8vw, 2.8em); /* Se hace pequeño en móvil y grande en PC */
            margin: 40px 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            line-height: 1.2;
        }

        /* GALERÍA RESPONSIVE */
        .galeria { 
            display: flex; 
            flex-wrap: wrap; /* Esto permite que bajen si no caben */
            justify-content: center; 
            gap: 20px; 
            width: 100%;
            max-width: 1200px; /* Para que en pantallas gigantes no se separen demasiado */
            margin-bottom: 50px;
        }

        /* ELEMENTOS (RECUADROS) */
        figure {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            /* Ancho adaptable: en móvil ocupa casi todo, en PC máximo 300px */
            width: 90%; 
            max-width: 300px;
            margin: 0;
            cursor: pointer;
            position: relative;
            animation: flotarTodo 5s infinite ease-in-out;
            transition: transform 0.3s ease;
            box-sizing: border-box; /* Para que el padding no rompa el ancho */
        }

        /* Retrasos para que el movimiento sea fluido */
        figure:nth-child(2) { animation-delay: 1s; }
        figure:nth-child(3) { animation-delay: 2s; }

        @keyframes flotarTodo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Efecto táctil o de ratón */
        figure:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* IMÁGENES QUE NO SE DEFORMAN */
        img { 
            width: 100%; 
            height: auto; /* Altura automática para no estirar la cara */
            aspect-ratio: 1 / 1; /* Las hace cuadradas perfectas */
            object-fit: cover; 
            border-radius: 18px;
            display: block;
        }

        figcaption {
            margin-top: 15px;
            font-weight: 600;
            color: #e6699c; 
            font-size: 1.1em;
        }

        /* CORAZONES BLANCOS (EFECTO CLIC/TOQUE) */
        .heart-spark {
            position: absolute;
            pointer-events: none;
            animation: fadeUp 1s forwards;
            color: white; 
            font-size: 30px;
            z-index: 1000;
            text-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150px) scale(2); }
        }
    </style>
</head>
<body>

    <h1>🤍 Nuestra Historia 🤍</h1>

    <div class="galeria">
        
        <figure onclick="crearCorazon(event)">
            <img src="foto1.jpg">
            <figcaption>Nuestra primera foto</figcaption>
        </figure>

        <figure onclick="crearCorazon(event)">
            <img src="foto2.jpg">
            <figcaption>Nuestra historia (fotos)</figcaption>
        </figure>

        <figure onclick="crearCorazon(event)">
            <img src="foto3.png">
            <figcaption>Nuestra historia (libro)</figcaption>
        </figure>

    </div>

    <script>
        function crearCorazon(e) {
            const heart = document.createElement('div');
            heart.className = 'heart-spark';
            heart.innerHTML = '🤍'; 
            // Soporte para toque en móvil y clic en PC
            const x = e.pageX || e.touches[0].pageX;
            const y = e.pageY || e.touches[0].pageY;
            
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            document.body.appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, 1000);
        }
    </script>

</body>
</html>
