<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        body { 
            background-color: #e6699c; 
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 0;
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .seccion {
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Fuerza la aparición de la primera pantalla */
        #capa1-password { display: flex; }

        input {
            padding: 15px;
            font-size: 1.2em;
            border-radius: 15px;
            border: 2px solid white;
            text-align: center;
            margin-top: 20px;
            color: #e6699c;
            font-weight: bold;
            background: white;
            outline: none;
        }

        .btn-romantico {
            margin-top: 25px;
            padding: 18px 35px;
            background-color: white;
            color: #e6699c;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.2em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .galeria { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            padding: 40px 10px;
        }

        figure {
            background: white;
            padding: 10px;
            border-radius: 20px;
            width: 280px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; }
        figcaption { color: #e6699c; font-weight: 600; margin-top: 10px; }

        .heart {
            position: absolute;
            pointer-events: none;
            animation: fly 0.8s linear forwards;
            font-size: 30px;
            z-index: 9999;
        }

        @keyframes fly {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150px) scale(2); }
        }
    </style>
</head>
<body>

    <div id="capa1-password" class="seccion">
        <h2>🤍 Contraseña 🤍</h2>
        <input type="password" id="pass" placeholder="Nuestra fecha..." onkeyup="validar()" maxlength="6">
    </div>

    <div id="capa2-frase" class="seccion">
        <h2 style="font-weight: 300;">esto es solo para ti....🤍</h2>
        <button class="btn-romantico" onclick="mostrarGaleria()">pulsa aqui si me quieres</button>
    </div>

    <div id="capa3-galeria" class="seccion" style="justify-content: flex-start;">
        <h1>🤍 Nuestra Historia 🤍</h1>
        <div class="galeria">
            <figure onclick="ir('https://photos.app.goo.gl/DKeySBjuzfcf59fYA')">
                <img src="foto1.jpg"><figcaption>Nuestra primera foto</figcaption>
            </figure>
            <figure onclick="corazon(event)">
                <img src="foto2.jpg"><figcaption>Nuestra historia (fotos)</figcaption>
            </figure>
            <figure onclick="corazon(event)">
                <img src="foto3.png"><figcaption>Nuestra historia (libro)</figcaption>
            </figure>
            <figure onclick="ir('amor.html')">
                <img src="foto4.png"><figcaption>para ti amor mio</figcaption>
            </figure>
            <figure onclick="ir('https://marcosss-22072444.github.io/Lasjordanmiamorteamoojaladurarparasiempre/')">
                <img src="foto5.png"><figcaption>Las jordan</figcaption>
            </figure>
        </div>
    </div>

    <script>
        function validar() {
            const passInput = document.getElementById('pass');
            if (passInput.value === '220724') {
                // Ocultar teclado en móviles
                passInput.blur(); 
                // Cambio de capa instantáneo
                document.getElementById('capa1-password').style.display = 'none';
                document.getElementById('capa2-frase').style.display = 'flex';
            }
        }

        function mostrarGaleria() {
            document.getElementById('capa2-frase').style.display = 'none';
            document.getElementById('capa3-galeria').style.display = 'flex';
            window.scrollTo(0,0);
        }

        function ir(url) {
            window.location.href = url;
        }

        function corazon(e) {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '🤍';
            // Soporte para PC y Móvil
            const x = e.pageX || (e.touches ? e.touches[0].pageX : 0);
            const y = e.pageY || (e.touches ? e.touches[0].pageY : 0);
            h.style.left = x + 'px';
            h.style.top = y + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 800);
        }
    </script>
</body>
</html>
