<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        body { 
            background-color: #e6699c; 
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 0;
            color: white; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CAPAS PRINCIPALES */
        .seccion {
            display: none; /* Todo oculto por defecto */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* Mostrar solo la primera al cargar */
        #capa1-password { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ESTILOS DE INPUT Y BOTÓN */
        input {
            padding: 15px;
            font-size: 1.2em;
            border-radius: 15px;
            border: none;
            text-align: center;
            margin-top: 20px;
            color: #e6699c;
            font-weight: bold;
            width: 80%;
            max-width: 250px;
        }

        .btn-romantico {
            margin-top: 25px;
            padding: 18px 35px;
            background-color: white;
            color: #e6699c;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255,255,255,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }

        /* GALERÍA */
        .galeria { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            padding: 40px 10px;
            max-width: 1200px;
        }

        figure {
            background: white;
            padding: 10px;
            border-radius: 20px;
            width: 280px;
            margin: 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            animation: flotar 4s infinite ease-in-out;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; }
        figcaption { color: #e6699c; font-weight: 600; margin-top: 10px; }

        /* CORAZONES AL PULSAR */
        .heart {
            position: absolute;
            pointer-events: none;
            animation: fly 0.8s linear forwards;
            font-size: 30px;
        }

        @keyframes fly {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150px) scale(2); }
        }
    </style>
</head>
<body>

    <div id="capa1-password" class="seccion">
        <h2>🤍 Contraseña 🤍</h2>
        <input type="password" id="pass" placeholder="Nuestra fecha..." oninput="validar()" maxlength="6">
    </div>

    <div id="capa2-frase" class="seccion">
        <h2 style="font-weight: 300;">esto es solo para ti....🤍</h2>
        <button class="btn-romantico" onclick="mostrarGaleria()">pulsa aqui si me quieres</button>
    </div>

    <div id="capa3-galeria" class="seccion" style="justify-content: flex-start;">
        <h1>🤍 Nuestra
