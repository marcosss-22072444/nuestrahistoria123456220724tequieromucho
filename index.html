<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        body { 
            background-color: #e6699c; 
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 0;
            color: white; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .seccion {
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            animation: entradaSuave 0.6s ease-out;
        }

        @keyframes entradaSuave {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #capa1-password { display: flex; }

        h1 { 
            font-size: 1.6rem !important; 
            white-space: nowrap;
            margin: 30px 0;
        }

        input {
            padding: 15px;
            font-size: 1.2em;
            border-radius: 15px;
            border: 2px solid white;
            text-align: center;
            margin-top: 20px;
            color: #e6699c;
            font-weight: bold;
            background: white;
            outline: none;
        }

        .btn-romantico {
            margin-top: 25px;
            padding: 18px 35px;
            background-color: white;
            color: #e6699c;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            animation: latido 2s infinite;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .galeria { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            padding: 20px 10px 50px 10px;
        }

        figure {
            background: white;
            padding: 12px;
            border-radius: 25px;
            width: 280px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin: 0;
            transition: 0.3s;
            cursor: pointer;
        }

        img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 18px; display: block; }
        figcaption { color: #e6699c; font-weight: 600; margin-top: 15px; font-size: 1.1em; }

        .heart {
            position: absolute;
            pointer-events: none;
            animation: fly 0.8s linear forwards;
            font-size: 30px;
            z-index: 9999;
        }

        @keyframes fly {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150px) scale(2); }
        }

        @media (max-width: 600px) { figure { width: 90%; } }
    </style>
</head>
<body>

    <div id="player" style="position: absolute; top: -1000px;"></div>

    <div id="capa1-password" class="seccion">
        <h2>🤍 Contraseña 🤍</h2>
        <input type="password" id="pass" placeholder="Nuestra fecha..." onkeyup="validar()" maxlength="6">
    </div>

    <div id="capa2-frase" class="seccion">
        <h2 style="font-weight: 300;">esto es solo para ti....🤍</h2>
        <button class="btn-romantico" onclick="mostrarGaleria()">pulsa aqui si me quieres</button>
    </div>

    <div id="capa3-galeria" class="seccion" style="justify-content: flex-start;">
        <h1>🤍 Nuestra Historia 🤍</h1>
        <div class="galeria">
            <figure onclick="ir('https://photos.app.goo.gl/DKeySBjuzfcf59fYA')">
                <img src="foto1.jpg"><figcaption>Nuestra primera foto</figcaption>
            </figure>
            <figure onclick="corazon(event)">
                <img src="foto2.jpg"><figcaption>Nuestra historia (fotos)</figcaption>
            </figure>
            <figure onclick="corazon(event)">
                <img src="foto3.png"><figcaption>Nuestra historia (libro)</figcaption>
            </figure>
            <figure onclick="ir('amor.html')">
                <img src="foto4.png"><figcaption>para ti amor mio</figcaption>
            </figure>
            <figure onclick="ir('https://marcosss-22072444.github.io/Lasjordanmiamorteamoojaladurarparasiempre/')">
                <img src="foto5.png"><figcaption>Las jordan</figcaption>
            </figure>
        </div>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: '9n-hyA2-FDg',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': '9n-hyA2-FDg'
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // El reproductor ya está cargado y listo para sonar al instante
        }

        function validar() {
            const val = document.getElementById('pass').value;
            if (val === '220724') {
                document.getElementById('pass').blur();
                // Al poner la pass, ya le decimos que se prepare (buffer)
                if (player && player.cueVideoById) {
                    player.setVolume(25);
                }
                document.getElementById('capa1-password').style.display = 'none';
                document.getElementById('capa2-frase').style.display = 'flex';
            }
        }

        function mostrarGaleria() {
            // Ejecución inmediata
            if (player) {
                player.playVideo();
            }

            document.getElementById('capa2-frase').style.display = 'none';
            document.getElementById('capa3-galeria').style.display = 'flex';
            window.scrollTo(0,0);
        }

        function ir(url) { window.location.href = url; }

        function corazon(e) {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '🤍';
            const x = e.pageX || (e.touches ? e.touches[0].pageX : 0);
            const y = e.pageY || (e.touches ? e.touches[0].pageY : 0);
            h.style.left = x + 'px';
            h.style.top = y + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 800);
        }
    </script>
</body>
</html>
