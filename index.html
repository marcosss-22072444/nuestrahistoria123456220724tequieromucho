<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        body { 
            background-color: #e6699c; 
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 10px;
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: white; 
            font-size: clamp(1.5em, 7vw, 2.5em);
            margin: 40px 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .galeria { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            width: 100%;
            max-width: 1200px;
            margin-bottom: 50px;
        }

        figure {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 280px; 
            margin: 0;
            cursor: pointer;
            position: relative;
            animation: flotarTodo 5s infinite ease-in-out;
            transition: transform 0.2s ease;
            box-sizing: border-box;
            flex: 0 0 280px;
        }

        figure:nth-child(2) { animation-delay: 1s; }
        figure:nth-child(3) { animation-delay: 2s; }
        figure:nth-child(4) { animation-delay: 3s; }

        @keyframes flotarTodo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        figure:active { transform: scale(0.95); }

        img { 
            width: 100%; 
            height: auto; 
            aspect-ratio: 1 / 1; 
            object-fit: cover; 
            border-radius: 18px;
            display: block;
        }

        figcaption {
            margin-top: 15px;
            font-weight: 600;
            color: #e6699c; 
            font-size: 1.1em;
        }

        .heart-spark {
            position: absolute;
            pointer-events: none;
            animation: fadeUp 0.6s forwards;
            color: white; 
            font-size: 30px;
            z-index: 1000;
        }

        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120px) scale(1.5); }
        }

        @media (max-width: 600px) {
            figure { flex: 0 0 90%; }
        }
    </style>
</head>
<body>

    <h1>🤍 Nuestra Historia 🤍</h1>

    <div class="galeria">
        
        <figure onclick="irAlbum(event)">
            <img src="foto1.jpg">
            <figcaption>Nuestra primera foto</figcaption>
        </figure>

        <figure onclick="crearCorazon(event)">
            <img src="foto2.jpg">
            <figcaption>Nuestra historia (fotos)</figcaption>
        </figure>

        <figure onclick="crearCorazon(event)">
            <img src="foto3.jpg">
            <figcaption>Nuestra historia (libro)</figcaption>
        </figure>

        <figure onclick="irAmor(event)">
            <img src="foto4.png">
            <figcaption>para ti amor mio</figcaption>
        </figure>

    </div>

    <script>
        function irAlbum(e) {
            crearCorazon(e);
            setTimeout(() => { window.location.href = "https://photos.app.goo.gl/DKeySBjuzfcf59fYA"; }, 150);
        }

        function irAmor(e) {
            crearCorazon(e);
            setTimeout(() => { window.location.href = "amor.html"; }, 150);
        }

        function crearCorazon(e) {
            const heart = document.createElement('div');
            heart.className = 'heart-spark';
            heart.innerHTML = '🤍'; 
            const x = e.pageX || (e.touches && e.touches[0].pageX);
            const y = e.pageY || (e.touches && e.touches[0].pageY);
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 600);
        }
    </script>

</body>
</html>
