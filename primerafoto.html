<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Primera Foto 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Fondo oscuro elegante tipo cine */
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
            overflow: hidden;
        }

        .contenedor-imagen {
            max-width: 100%;
            max-height: 80vh; /* Deja espacio abajo para el botón */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenedor-imagen img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain; /* Se estira todo lo posible sin deformarse */
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-cerrar {
            margin-top: 25px;
            padding: 12px 30px;
            background-color: #e6699c; /* Rosa para que vaya a juego con tu web */
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }

        .btn-cerrar:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="contenedor-imagen">
        <img src="NuestraPrimeraFoto.jpg" alt="Nuestra primera foto">
    </div>

    <a href="javascript:void(0);" onclick="cerrarVentana()" class="btn-cerrar">← Volver a nuestra historia</a>

    <script>
        function cerrarVentana() {
            window.close(); // Intenta cerrar la pestaña si el navegador deja
            
            // Si el móvil bloquea el cierre automático, regresa seguro a la principal
            setTimeout(function() {
                window.location.href = 'index.html'; 
            }, 100);
        }
    </script>

</body>
</html>
