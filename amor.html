<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 🤍</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Playfair+Display:ital,wght@1,400;1,600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,220,235,0.9) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 80%, rgba(255,180,210,0.7) 0%, transparent 50%),
    linear-gradient(160deg, #fce4ef 0%, #f8cce0 40%, #f5b8d4 100%);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow-x:hidden; font-family:'Dancing Script',cursive;
  padding: 40px 20px;
  gap: 24px;
}

/* Título superior */
.main-title {
  font-size: 2.5rem;
  color: #ffffff;
  text-shadow: 0 4px 8px rgba(180,0,60,0.2);
  margin-bottom: 10px;
  z-index: 3;
}

/* floating hearts */
.fh{position:fixed;inset:0;pointer-events:none;z-index:0;}
.fh span{position:absolute;animation:fhUp linear infinite;opacity:0;}
@keyframes fhUp{
  0%  {transform:translateY(105vh) rotate(-10deg);opacity:0}
  8%  {opacity:0.28}
  92% {opacity:0.2}
  100%{transform:translateY(-8vh)  rotate(15deg);opacity:0}
}

/* stage */
.stage{position:relative;z-index:2;cursor:pointer;user-select:none;
  transition:transform .25s; margin-top: 10px;}
.stage:hover{transform:scale(1.015);}
.stage:active{transform:scale(0.98);}

/* ── GRID DE TARJETAS ── */
.menu-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  max-width: 1100px;
  width: 100%;
  z-index: 3;
}

.menu-card {
  background: #ffffff;
  border-radius: 24px;
  width: 190px;
  height: 190px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 18px 12px;
  box-shadow: 0 10px 25px rgba(230, 100, 150, 0.15);
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  user-select: none;
}

.menu-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 14px 30px rgba(210, 50, 120, 0.25);
}

.card-icon-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.card-emoji {
  font-size: 4.2rem;
}

/* Forzamos el tamaño y el fondo con la imagen foto7.png para el nuevo cuadrado */
.menu-card.foto7-bg {
  background-image: url('foto7.png') !important;
  background-repeat: no-repeat !important;
  background-position: center center !important;
  background-size: cover !important;
  position: relative !important;
}

/* Filtro sutil para asegurar que las letras rosas se lean perfectamente sobre tu foto */
.menu-card.foto7-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 24px;
  background: linear-gradient(to top, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 50%);
  z-index: 1;
}

.card-text {
  font-family: Arial, sans-serif;
  font-size: 0.9rem;
  font-weight: bold;
  color: #db5388;
  text-align: center;
  z-index: 2;
  white-space: nowrap;
}

/* MODALES / OVERLAYS */
.overlay{
  position:fixed;inset:0;
  background:rgba(220,80,130,0.35);
  backdrop-filter:blur(12px) saturate(1.3);
  z-index:200;display:none;
  align-items:center;justify-content:center;
  padding:20px;
}
.overlay.open{display:flex;animation:fadeOverlay .3s ease both}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}

.card{
  background:linear-gradient(155deg,#fff8fb 0%,#ffe4ef 50%,#ffd2e8 100%);
  border:2px solid rgba(244,160,192,0.7);
  border-radius:36px;
  padding:3rem 2.6rem 2.4rem;
  max-width:380px;width:100%;
  text-align:center;
  box-shadow:
    0 20px 60px rgba(180,0,70,0.28),
    0 4px 12px rgba(255,150,190,0.2),
    inset 0 2px 12px rgba(255,255,255,0.8);
  animation:cardPop .6s cubic-bezier(.34,1.56,.64,1) both;
  position:relative; overflow:hidden;
}
@keyframes cardPop{from{opacity:0;transform:scale(0.3) rotate(-8deg)}to{opacity:1;transform:scale(1)}}

.card-top-heart{display:flex;align-items:center;justify-content:center;margin-bottom:.7rem;animation:topHeart 2s ease-in-out infinite;transform-origin:center;}
.card-top-heart svg{width:72px;height:66px;filter:drop-shadow(0 4px 12px rgba(180,0,60,0.45));}
@keyframes topHeart{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
.card-subtitle{font-family:'Playfair Display',serif;font-style:italic;font-weight:600;color:#c06080;font-size:1.05rem;letter-spacing:.08em;margin-bottom:.5rem;}
.card-main{font-size:2rem;font-weight:700;color:#880038;line-height:1.45;margin:.6rem 0 .9rem;}
.card-body{font-size:1.22rem;color:#a03a60;line-height:1.7;margin-bottom:1.3rem;}
.card-love{font-size:2.2rem;font-weight:700;color:#b8003a;display:block;margin-bottom:1.5rem;}
.card-hearts{font-size:1.6rem;letter-spacing:.4rem;margin-bottom:1.6rem;display:block;}

.close-btn {
  background: #db5388;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 1rem;
  cursor: pointer;
  font-family: Arial, sans-serif;
  font-weight: bold;
  transition: background 0.2s;
}
.close-btn:hover {
  background: #c03a6e;
}
</style>
</head>
<body>

<div class="fh" id="fh"></div>

<h1 class="main-title">🤍 Nuestra Historia 🤍</h1>

<div class="stage" id="stageDiv">
  <canvas id="c" width="400" height="490"></canvas>
</div>

<div class="menu-grid">
  
  <div class="menu-card" onclick="openModal('mod1')">
    <div class="card-icon-wrap"><span class="card-emoji">🤍</span></div>
    <div class="card-text">Nuestra primera foto</div>
  </div>

  <div class="menu-card" onclick="openModal('mod2')">
    <div class="card-icon-wrap"><span class="card-emoji" style="font-size:3.8rem;">👨‍❤️‍👩</span></div>
    <div class="card-text">Nuestra historia (fotos)</div>
  </div>

  <div class="menu-card" onclick="openModal('mod3')">
    <div class="card-icon-wrap"><span class="card-emoji">📖</span></div>
    <div class="card-text">Nuestra historia (libro)</div>
  </div>

  <div class="menu-card" onclick="openModal('modOriginal')">
    <div class="card-icon-wrap"><span class="card-emoji">🌹</span></div>
    <div class="card-text">para ti amor mio</div>
  </div>

  <div class="menu-card" onclick="openModal('modJordan')">
    <div class="card-icon-wrap"><span class="card-emoji">👦🏻</span></div>
    <div class="card-text">Las jordan</div>
  </div>

  <div class="menu-card" onclick="openModal('modCarta')">
    <div class="card-icon-wrap"><span class="card-emoji">📜</span>
