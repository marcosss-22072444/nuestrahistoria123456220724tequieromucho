<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Atrás Sorpresa 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        body { 
            background-color: #e6699c; /* Fondo rosa inicial */
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 0;
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px;
            overflow: hidden;
        }

        /* --- ESTILOS CUENTA ATRÁS --- */
        h1 { font-size: 1.8rem; margin-bottom: 10px; font-weight: 600; }
        p { font-size: 1.1rem; font-weight: 300; margin-bottom: 30px; }

        .contador {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .caja {
            background: white;
            color: #e6699c;
            padding: 15px 20px;
            border-radius: 20px;
            min-width: 70px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .numero { font-size: 2rem; font-weight: 600; display: block; }
        .etiqueta { font-size: 0.8rem; text-transform: uppercase; font-weight: 300; }

        /* --- ESTILOS CONTENEDOR PDF (MODO CINE, OCULTO AL INICIO) --- */
        .contenedor-pdf {
            display: none; /* COMPLETAMENTE OCULTO MIENTRAS HAYA CUENTA ATRÁS */
            width: 100%;
            max-width: 100%;
            height: 75vh; 
            max-height: 75vh;
            justify-content: center;
            align-items: center;
        }

        .contenedor-pdf iframe {
            width: 100%;
            height: 100%;
            max-width: 600px; /* Ancho ideal de lectura tipo cómic */
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- BOTÓN DE VOLVER --- */
        .btn-cerrar {
            margin-top: 25px;
            padding: 14px 35px;
            background-color: white; /* Blanco al principio sobre el fondo rosa */
            color: #e6699c;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-decoration: none; 
            display: inline-block;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-cerrar:active {
            transform: scale(0.95);
        }

        /* Cuando se active el modo cine, el botón cambia a este estilo */
        .btn-cerrar.modo-cine {
            background-color: #e6699c;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* --- EFECTO CORAZONES --- */
        .heart {
            position: absolute;
            pointer-events: none;
            animation: fly 0.8s linear forwards;
            font-size: 30px;
            z-index: 9999;
        }

        @keyframes fly {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150px) scale(2); }
        }

        /* --- ADAPTACIÓN RESPONSIVE --- */
        @media (min-width: 1024px) {
            .btn-cerrar.modo-cine:hover {
                background-color: #f082ae;
            }
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            
            h1 { font-size: 1.5rem; }
            p { font-size: 1rem; padding: 0 10px; }
            
            .contador { gap: 8px; }
            .caja { padding: 10px 12px; min-width: 55px; }
            .numero { font-size: 1.5rem; }
            .etiqueta { font-size: 0.7rem; }
            
            .contenedor-pdf { height: 70vh; max-height: 70vh; }
            .contenedor-pdf iframe { width: 95%; border-radius: 15px; }
            
            .btn-cerrar {
                width: 80%;
                max-width: 280px;
                padding: 16px 20px;
                font-size: 1.05em;
            }
        }
    </style>
</head>
<body onclick="corazon(event)">

    <!-- Bloque de la Cuenta Atrás (Se borra entero al terminar) -->
    <div id="bloque-espera">
        <h1>🤍 Falta muy poco... 🤍</h1>
        <p>Esta sorpresa se abrirá automáticamente el 29 de Julio a las 4:00 PM</p>
        
        <div class="contador">
            <div class="caja"><span class="numero" id="dias">00</span><span class="etiqueta">Días</span></div>
            <div class="caja"><span class="numero" id="horas">00</span><span class="etiqueta">Horas</span></div>
            <div class="caja"><span class="numero" id="mins">00</span><span class="etiqueta">Min</span></div>
            <div class="caja"><span class="numero" id="segs">00</span><span class="etiqueta">Seg</span></div>
        </div>
    </div>

    <!-- Bloque Desbloqueado: PDF gigante (Solo se activa al llegar a cero) -->
    <div id="bloque-desbloqueado" class="contenedor-pdf">
        <iframe src="SPIDER-MAN BRAND NEW DAY.pdf" type="application/pdf"></iframe>
    </div>

    <!-- Botón de navegación -->
    <a href="javascript:void(0);" onclick="cerrarVentana()" id="boton-navegacion" class="btn-cerrar">← Volver a nuestra historia</a>

    <script>
        const fechaObjetivo = new Date(2026, 6, 29, 16, 0, 0).getTime();

        const x = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaObjetivo - ahora;

            const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

            if (distancia > 0) {
                document.getElementById("dias").innerHTML = dias < 10 ? "0" + dias : dias;
                document.getElementById("horas").innerHTML = horas < 10 ? "0" + horas : horas;
                document.getElementById("mins").innerHTML = minutos < 10 ? "0" + minutos : minutes;
                document.getElementById("segs").innerHTML = segundos < 10 ? "0" + segundos : segundos;
            }

            // AL LLEGAR A CERO: Limpieza total y cambio a modo cine
            if (distancia <= 0) {
                clearInterval(x);
                
                // 1. Desaparece por completo todo lo de la cuenta atrás
                document.getElementById("bloque-espera").style.display = "none";
                
                // 2. Aparece el PDF con su formato grande
                document.getElementById("bloque-desbloqueado").style.display = "flex";
                
                // 3. El fondo cambia al negro elegante de cine
                document.body.style.backgroundColor = "#1a1a1a";
                
                // 4. El botón pasa a ser rosa con letras blancas automáticamente
                const boton = document.getElementById("boton-navegacion");
                boton.classList.add("modo-cine");
            }
        }, 1000);

        function cerrarVentana() {
            window.close();
            setTimeout(function() {
                window.location.href = 'index.html'; 
            }, 100);
        }

        function corazon(e) {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '🤍';
            const xPos = e.pageX || (e.touches ? e.touches[0].pageX : 0);
            const yPos = e.pageY || (e.touches ? e.touches[0].pageY : 0);
            h.style.left = xPos + 'px';
            h.style.top = yPos + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 800);
        }
    </script>
</body>
</html>
