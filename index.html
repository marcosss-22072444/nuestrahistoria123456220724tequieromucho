<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestra Historia</title>
    <style>
        body { 
            background-color: #fce4ec; 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            padding: 20px;
        }
        h1 { color: #d81b60; margin-top: 30px; }
        .galeria { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 30px;
        }
        figure {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: 0;
            width: 300px;
        }
        img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            border-radius: 10px;
        }
        figcaption {
            margin-top: 10px;
            font-weight: bold;
            color: #555;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <h1>🤍 Nuestra Historia 🤍</h1>

    <div class="galeria">
        
        <figure>
            <img src="foto1.jpg">
            <figcaption>Nuestra primera foto</figcaption>
        </figure>

        <figure>
            <img src="foto2.jpg">
            <figcaption>Nuestra historia completa</figcaption>
        </figure>

    </div>

</body>
</html>
