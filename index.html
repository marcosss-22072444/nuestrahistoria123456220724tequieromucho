<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia 🤍</title>
    <style>
        /* Estilos Globales */
        body { 
            background-color: #fff5f7; /* Rosa muy claro y elegante */
            text-align: center; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 50px 20px;
            color: #444;
        }

        h1 { 
            color: #ff758c; 
            font-weight: 300;
            font-size: 2.5em;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .galeria { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 35px; 
        }

        /* El recuadro con efecto flotante mínimo */
        figure {
            background: #ffffff;
            padding: 12px;
            border-radius: 25px; /* Bordes muy suaves */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Sombra inicial mínima */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 280px;
            margin: 0;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* Elevación sutil al pasar el ratón */
        figure:hover {
            transform: translateY(-8px); /* Elevación mínima */
            box-shadow: 0 12px 25px rgba(255, 117, 140, 0.15); /* Sombra más suave y rosada */
        }

        img { 
            width: 100%; 
            height: 320px; 
            object-fit: cover; 
            border-radius: 18px; /* Imagen interna también suave */
        }

        figcaption {
            margin-top: 15px;
            font-weight: 500;
            color: #ff758c;
            font-size: 1.1em;
        }

        /* Animación suave de latido para el corazón */
        .latido-suave {
            animation: latir 3s infinite ease-in-out;
        }

        @keyframes latir {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* Corazones al hacer clic */
        .heart-spark {
            position: absolute;
            pointer-events: none;
            animation: fadeUp 1s forwards;
            color: #ff758c;
        }

        @keyframes fadeUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
    </style>
</head>
<body>

    <h1>Nuestra Historia</h1>

    <div class="galeria">
        
        <figure class="latido-suave" onclick="spark(event)">
            <img src="foto1.jpg">
            <figcaption>Nuestra primera foto</figcaption>
        </figure>

        <figure onclick="spark(event)">
            <img src="foto2.jpg">
            <figcaption>Nuestra historia completa</figcaption>
        </figure>

    </div>

    <script>
        function spark(e) {
            const heart = document.createElement('div');
            heart.className = 'heart-spark';
            heart.innerHTML = '❤️';
            heart.style.left = e.pageX + 'px';
            heart.style.top = e.pageY + 'px';
            heart.style.position = 'absolute';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    </script>

</body>
</html>
