<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Historia 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        /* FONDO: Usando el rosa intenso que pediste */
        body { 
            background-color: #e6699c; 
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            padding: 20px;
            color: white; /* Texto principal en blanco para que resalte */
            min-height: 100vh;
        }

        /* TÍTULO: Congelado y limpio */
        h1 { 
            color: white; 
            font-size: 2.5em;
            margin-top: 40px;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .galeria { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 30px; 
            margin-top: 20px;
        }

        /* ELEMENTOS: Recuadros blancos con efecto flotante */
        figure {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 280px;
            margin: 0;
            cursor: pointer;
            position: relative;
            /* Animación unificada para todos */
            animation: flotarTodo 5s infinite ease-in-out;
            transition: transform 0.3s ease;
        }

        /* Variamos un poco el inicio de la animación para que no se muevan en bloque rígido */
        figure:nth-child(2) { animation-delay: 1s; }
        figure:nth-child(3) { animation-delay: 2s; }

        @keyframes flotarTodo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        figure:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            border-radius: 18px;
        }

        figcaption {
            margin-top: 15px;
            font-weight: 600;
            color: #e6699c; /* Texto del pie de foto en el rosa del fondo */
            font-size: 1.1em;
        }

        /* CORAZONES BLANCOS AL HACER CLIC */
        .heart-spark {
            position: absolute;
            pointer-events: none;
            animation: fadeUp 1s forwards;
            color: white; /* Corazones blancos siempre */
            font-size: 25px;
            z-index: 1000;
            text-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150px) scale(2); }
        }
    </style>
</head>
<body>

    <h1>🤍 Nuestra Historia 🤍</h1>

    <div class="galeria">
        
        <figure onclick="crearCorazon(event)">
            <img src="foto1.jpg">
            <figcaption>Nuestra primera foto</figcaption>
        </figure>

        <figure onclick="crearCorazon(event)">
            <img src="foto2.jpg">
            <figcaption>Nuestra historia (fotos)</figcaption>
        </figure>

        <figure onclick="crearCorazon(event)">
            <img src="foto3.jpg">
            <figcaption>Nuestra historia (libro)</figcaption>
        </figure>

    </div>

    <script>
        // Función mejorada para que los corazones salgan siempre en blanco
        function crearCorazon(e) {
            const heart = document.createElement('div');
            heart.className = 'heart-spark';
            heart.innerHTML = '🤍'; // Emoji de corazón blanco
            heart.style.left = e.pageX + 'px';
            heart.style.top = e.pageY + 'px';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 1000);
        }
    </script>

</body>
</html>
